version: '3.8'

services:
  postgres:
    image: postgres:13-alpine
    container_name: bank-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bank}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d bank"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bank-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: bank-server-prod
    environment:
      - NODE_ENV=production
      - PORT=4000
      - TRANSPORT_PORT=5000
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_EXPIRATION_TIME=${JWT_EXPIRATION_TIME:-3600}
      - JWT_FORGOTTEN_PASSWORD_TOKEN_SECRET=${JWT_FORGOTTEN_PASSWORD_TOKEN_SECRET}
      - JWT_FORGOTTEN_PASSWORD_TOKEN_EXPIRATION_TIME=${JWT_FORGOTTEN_PASSWORD_TOKEN_EXPIRATION_TIME:-3600}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE:-bank}
      - BANK_ROOT_EMAIL=${BANK_ROOT_EMAIL}
      - BANK_ROOT_PASSWORD=${BANK_ROOT_PASSWORD}
      - BANK_AUTHOR_EMAIL=${BANK_AUTHOR_EMAIL}
      - BANK_AUTHOR_PASSWORD=${BANK_AUTHOR_PASSWORD}
      - BANK_AUTHOR_FIRSTNAME=${BANK_AUTHOR_FIRSTNAME:-Adrian}
      - BANK_AUTHOR_LASTNAME=${BANK_AUTHOR_LASTNAME:-Pietrzak}
      - EMAIL_HOST=${EMAIL_HOST:-gmail}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_ADDRESS=${EMAIL_ADDRESS}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  bank-client:
    build:
      context: ../bank-client
      dockerfile: Dockerfile
      target: production
    container_name: bank-client-prod
    environment:
      - REACT_APP_API_URL=http://localhost:4000/bank
    ports:
      - "80:80"
    depends_on:
      - bank-server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_prod_data:
    driver: local

networks:
  default:
    name: bank-network-prod

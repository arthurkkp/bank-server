version: '3.8'

services:
  postgres:
    image: postgres:13-alpine
    container_name: bank-postgres
    environment:
      POSTGRES_DB: bank
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d bank"]
      interval: 10s
      timeout: 5s
      retries: 5

  bank-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bank-server
    environment:
      - NODE_ENV=development
      - PORT=4000
      - TRANSPORT_PORT=5000
      - JWT_SECRET_KEY=uEqxtQNNOeKVP54h
      - JWT_EXPIRATION_TIME=3600
      - JWT_FORGOTTEN_PASSWORD_TOKEN_SECRET=3213dasdas
      - JWT_FORGOTTEN_PASSWORD_TOKEN_EXPIRATION_TIME=3600
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - DB_DATABASE=bank
      - BANK_ROOT_EMAIL=root@bank.com
      - BANK_ROOT_PASSWORD=123456
      - BANK_AUTHOR_EMAIL=author@bank.com
      - BANK_AUTHOR_PASSWORD=123456
      - BANK_AUTHOR_FIRSTNAME=Adrian
      - BANK_AUTHOR_LASTNAME=Pietrzak
      - EMAIL_HOST=gmail
      - EMAIL_PORT=587
      - EMAIL_ADDRESS=payment@gmail.com
      - EMAIL_PASSWORD=uEqx2QNNOeKVP54h
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
      - ./package.json:/app/package.json:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/bank"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  bank-client:
    build:
      context: ../bank-client
      dockerfile: Dockerfile
    container_name: bank-client
    environment:
      - REACT_APP_API_URL=http://bank-server:4000/bank
    ports:
      - "3000:80"
    depends_on:
      - bank-server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: bank-network
